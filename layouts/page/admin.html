{{ define "main" }}
<div id="login-container" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">System Admin Login</h2>
    <input type="password" id="password-input" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-blue-500" placeholder="Enter Password">
    <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">Unlock</button>
    <p id="error-msg" class="text-red-500 text-sm mt-3 hidden font-medium">Access denied.</p>
</div>
<div id="admin-content" class="hidden">
    <article class="max-w-4xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100 mt-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-8 border-b pb-4">{{ .Title }}</h1>
        <div class="prose prose-blue prose-lg max-w-none">
            {{ .Content }}
        </div>
    </article>
</div>
<script>
    function checkPassword() {
        if (document.getElementById('password-input').value === 'admin123') { 
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            document.getElementById('error-msg').classList.add('hidden');
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
        }
    }
</script>
{{ end }}
