{{ define "main" }}
<article class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100">
    <header class="mb-8 border-b border-gray-100 pb-8 text-center">
        <div class="flex justify-center items-center gap-2 mb-4">
            <span class="px-3 py-1 rounded-full bg-blue-100 text-blue-800 text-sm font-bold uppercase tracking-wide">
                {{ if .Params.tags }}{{ index .Params.tags 0 }}{{ else }}Update{{ end }}
            </span>
            <time class="text-sm text-gray-500 font-medium">{{ .Date.Format "January 2, 2006" }}</time>
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 leading-tight">{{ .Title }}</h1>
    </header>
    
    <div class="prose prose-blue prose-lg max-w-none mx-auto">
        {{ .Content }}
    </div>
</article>
{{ end }}
