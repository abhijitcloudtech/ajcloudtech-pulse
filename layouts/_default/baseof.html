<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | Pulse Insights</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased flex flex-col min-h-screen">
    
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 py-6 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600 tracking-tight">Pulse Insights</a>
            <nav class="text-sm font-medium text-gray-600">
                <a href="/" class="hover:text-blue-600">Home</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-10 w-full">
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12 py-8 text-center text-gray-500 text-sm">
        <p>&copy; {{ now.Year }} ajcloudtech.in. Automated AI Insights.</p>
    </footer>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'base' });
      
      document.addEventListener('DOMContentLoaded', () => {
        // Find all code blocks generated by Markdown that contain mermaid code
        const elements = document.querySelectorAll('.language-mermaid');
        elements.forEach(el => {
          // Create a new div specifically for mermaid
          const div = document.createElement('div');
          div.className = 'mermaid flex justify-center my-8 bg-white p-4 rounded-xl border border-gray-100 shadow-sm overflow-x-auto';
          div.textContent = el.textContent;
          
          // Replace the <pre> tag with our new div
          if (el.parentElement.tagName === 'PRE') {
             el.parentElement.replaceWith(div);
          }
        });
        // Run the render process
        mermaid.run();
      });
    </script>
</body>
</html>
